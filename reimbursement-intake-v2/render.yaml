services:
  - type: web
    name: reimbursement-intake-v2
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      # ── UiPath auth — prefer client_credentials (no manual token refresh) ──
      - key: UIPATH_CLIENT_ID
        sync: false
      - key: UIPATH_CLIENT_SECRET
        sync: false
      # Fallback if the two above aren't set (expires ~1hr, needs manual refresh)
      - key: UIPATH_ACCESS_TOKEN
        sync: false

      # ── Pre-filled — Shared/ReimbursementFullSolution ──────────────────────
      - key: UIPATH_BASE_URL
        value: https://staging.uipath.com/hackathon26_332/DefaultTenant
      - key: UIPATH_FOLDER_ID
        value: "3152226"
      - key: UIPATH_BUCKET_ID
        value: "232381"
      - key: UIPATH_CASE_RELEASE_KEY
        value: BE62E793-6695-436B-8D22-CAF6A2ED6416
      - key: UIPATH_CONFIRMATION_RELEASE_KEY
        value: ff4b2d54-d0f9-43b7-a21b-7ac1d90afe1a

      # ── Belt-and-suspenders email (optional) ───────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_NOTIFY_TO
        value: akashgomez28@gmail.com

      # ── Not consumed by this app directly (see .env.example) — set here
      # only if you extend api.py to call StripePayoutWorkflow directly ──────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false

      # ── /admin panel — required for /admin and every /api/admin/* route ────
      - key: ADMIN_USER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
